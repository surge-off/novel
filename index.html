<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>러닝 신호등 🏃‍♂️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            transition: background-color 0.5s ease;
            background-color: #1e293b;
            color: white;
            text-align: center;
        }
        #icon {
            font-size: 100px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }
        #message {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        #primary-detail {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .data-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: none; /* 초기에는 숨김 */
        }
        .data-row {
            font-size: 1rem;
            margin: 5px 0;
            opacity: 0.9;
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }
        #location-info {
            font-size: 0.9rem;
            opacity: 0.7;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div id="icon">⏳</div>
    <div id="message">대기질 분석 중...</div>
    <div id="primary-detail">데이터를 불러오는 중입니다</div>
    
    <div class="data-box" id="data-box">
        <div class="data-row">
            <span>미세먼지 (PM10)</span>
            <span id="val-pm10">-</span>
        </div>
        <div class="data-row">
            <span>초미세먼지 (PM2.5)</span>
            <span id="val-pm25">-</span>
        </div>
        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.2); margin: 10px 0;">
        <div class="data-row" style="font-size: 0.9rem; opacity: 0.8;">
            <span>오존 (O3)</span>
            <span id="val-o3">-</span>
        </div>
        <div class="data-row" style="font-size: 0.9rem; opacity: 0.8;">
            <span>이산화질소 (NO2)</span>
            <span id="val-no2">-</span>
        </div>
    </div>

    <div id="location-info"></div>

    <script>
        const API_KEY = 'd52470c737c315329b21e95427f7bcb11e1750f4f7e64cf7671e84b14ff59cc7'; 
        const SIDO_NAME = '경기'; 
        const STATION_NAME = '인계동'; 

        function updateUI(pm10, pm25, o3, no2) {
            const body = document.body;
            const icon = document.getElementById('icon');
            const message = document.getElementById('message');
            const primaryDetail = document.getElementById('primary-detail');
            
            document.getElementById('data-box').style.display = 'block';
            document.getElementById('val-pm10').innerText = `${pm10} µg/m³`;
            document.getElementById('val-pm25').innerText = `${pm25} µg/m³`;
            document.getElementById('val-o3').innerText = `${o3} ppm`;
            document.getElementById('val-no2').innerText = `${no2} ppm`;
            document.getElementById('location-info').innerText = `📍 ${SIDO_NAME} ${STATION_NAME} 측정소 기준`;

            let status = 0; 
            
            if (pm10 > 150 || pm25 > 75) status = 3;
            else if (pm10 > 80 || pm25 > 35) status = 2;
            else if (pm10 > 30 || pm25 > 15) status = 1;

            if (status === 0) {
                body.style.backgroundColor = '#3b82f6'; 
                icon.innerText = '🤩';
                message.innerText = '최상의 컨디션!';
                primaryDetail.innerText = '당장 러닝화를 신으세요';
            } else if (status === 1) {
                body.style.backgroundColor = '#22c55e'; 
                icon.innerText = '🏃‍♂️';
                message.innerText = '가볍게 뛰기 좋아요';
                primaryDetail.innerText = '야외 훈련하기 무난한 공기입니다';
            } else if (status === 2) {
                body.style.backgroundColor = '#f97316'; 
                icon.innerText = '😷';
                message.innerText = '마스크 챙기셨나요?';
                primaryDetail.innerText = '호흡기가 예민하다면 실내 훈련 권장';
            } else {
                body.style.backgroundColor = '#ef4444'; 
                icon.innerText = '🛑';
                message.innerText = '절대 나가지 마세요!';
                primaryDetail.innerText = '오늘은 폼롤러와 실내 코어 운동의 날';
            }
        }

        async function getAirQualityData() {
            // 수정된 부분: '측정소별 실시간 측정정보 조회' API를 사용하여 인계동 데이터만 직접 호출 (버전 1.3 적용)
            const url = `https://apis.data.go.kr/B552584/ArpltnInforInqireSvc/getMsrstnAcctoRltmMesureDnsty?serviceKey=${API_KEY}&returnType=json&numOfRows=1&pageNo=1&stationName=${encodeURIComponent(STATION_NAME)}&dataTerm=DAILY&ver=1.3`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                // 정상적으로 배열 형태의 데이터를 받았는지 검증
                if (data.response && data.response.body && data.response.body.items && data.response.body.items.length > 0) {
                    // 가장 최신 데이터는 배열의 첫 번째[0]에 위치합니다
                    const stationData = data.response.body.items[0];

                    const pm10 = parseInt(stationData.pm10Value);
                    const pm25 = parseInt(stationData.pm25Value);
                    const o3 = stationData.o3Value || '-';
                    const no2 = stationData.no2Value || '-';
                    
                    if (!isNaN(pm10) || !isNaN(pm25)) {
                        updateUI(pm10, pm25, o3, no2);
                    } else {
                        document.getElementById('icon').innerText = '🛠️';
                        document.getElementById('message').innerText = '측정소 점검 중';
                        document.getElementById('primary-detail').innerText = '현재 수치 업데이트가 지연되고 있습니다.';
                    }
                } else {
                    document.getElementById('icon').innerText = '😥';
                    document.getElementById('message').innerText = '데이터 없음';
                    document.getElementById('primary-detail').innerText = '인계동 측정소의 최신 데이터가 없습니다.';
                }
            } catch (error) {
                console.error("API 호출 에러:", error);
                document.getElementById('icon').innerText = '🔌';
                document.getElementById('message').innerText = '연결 실패';
                document.getElementById('primary-detail').innerText = '네트워크 문제이거나 브라우저 보안(CORS) 차단일 수 있습니다.';
            }
        }

        window.onload = () => {
            getAirQualityData(); 
        };
    </script>
</body>
</html>
