<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>러닝 신호등 🏃‍♂️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            transition: background-color 0.5s ease;
            background-color: #1e293b;
            color: white;
            text-align: center;
        }
        #icon {
            font-size: 100px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }
        #message {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 10px;
            padding: 0 20px;
            word-break: keep-all;
        }
        #primary-detail {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 20px;
            opacity: 0.9;
        }
        .data-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: none;
            width: 80%;
            max-width: 350px;
        }
        .data-row {
            font-size: 1rem;
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }
        #location-info {
            font-size: 0.9rem;
            opacity: 0.7;
            background: rgba(0,0,0,0.1);
            padding: 8px 15px;
            border-radius: 20px;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div id="icon">📍</div>
    <div id="message">위치 확인 중...</div>
    <div id="primary-detail">GPS 정보를 가져오고 있습니다</div>
    
    <div class="data-box" id="data-box">
        <div class="data-row">
            <span>미세먼지 (PM10)</span>
            <span id="val-pm10" style="font-weight: bold;">-</span>
        </div>
        <div class="data-row">
            <span>초미세먼지 (PM2.5)</span>
            <span id="val-pm25" style="font-weight: bold;">-</span>
        </div>
        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.2); margin: 12px 0;">
        <div class="data-row" style="font-size: 0.9rem; opacity: 0.8;">
            <span>오존 (O3)</span>
            <span id="val-o3">-</span>
        </div>
        <div class="data-row" style="font-size: 0.9rem; opacity: 0.8;">
            <span>이산화질소 (NO2)</span>
            <span id="val-no2">-</span>
        </div>
    </div>

    <div id="location-info"></div>

    <script>
        // 발급받은 API 키 세팅
        const AIR_KOREA_API_KEY = 'd52470c737c315329b21e95427f7bcb11e1750f4f7e64cf7671e84b14ff59cc7'; 
        const KAKAO_REST_API_KEY = '8811331ec6b369285c4409ab6f200d2f'; 

        // 4단계: 화면 색상 및 데이터 업데이트
        function updateUI(pm10, pm25, o3, no2, stationName) {
            const body = document.body;
            const icon = document.getElementById('icon');
            const message = document.getElementById('message');
            const primaryDetail = document.getElementById('primary-detail');
            
            // 데이터 박스 표시
            document.getElementById('data-box').style.display = 'block';
            document.getElementById('val-pm10').innerText = `${pm10} µg/m³`;
            document.getElementById('val-pm25').innerText = `${pm25} µg/m³`;
            document.getElementById('val-o3').innerText = `${o3} ppm`;
            document.getElementById('val-no2').innerText = `${no2} ppm`;
            document.getElementById('location-info').innerText = `📍 현재 위치: '${stationName}' 측정소`;

            // 상태 판별 (PM10, PM2.5 중 더 나쁜 수치 기준)
            let status = 0; 
            if (pm10 > 150 || pm25 > 75) status = 3;
            else if (pm10 > 80 || pm25 > 35) status = 2;
            else if (pm10 > 30 || pm25 > 15) status = 1;

            if (status === 0) {
                body.style.backgroundColor = '#3b82f6'; // 파랑
                icon.innerText = '🤩';
                message.innerText = '최상의 컨디션!';
                primaryDetail.innerText = '당장 러닝화를 신으세요';
            } else if (status === 1) {
                body.style.backgroundColor = '#22c55e'; // 초록
                icon.innerText = '🏃‍♂️';
                message.innerText = '가볍게 뛰기 좋아요';
                primaryDetail.innerText = '야외 훈련하기 무난한 공기입니다';
            } else if (status === 2) {
                body.style.backgroundColor = '#f97316'; // 주황
                icon.innerText = '😷';
                message.innerText = '마스크 챙기셨나요?';
                primaryDetail.innerText = '호흡기가 예민하다면 실내 훈련 권장';
            } else {
                body.style.backgroundColor = '#ef4444'; // 빨강
                icon.innerText = '🛑';
                message.innerText = '절대 나가지 마세요!';
                primaryDetail.innerText = '오늘은 폼롤러와 실내 코어 운동의 날';
            }
        }

        // 3단계: 측정소 이름으로 대기질 데이터 가져오기 (에어코리아)
        async function getAirQualityData(stationName) {
            const url = `https://apis.data.go.kr/B552584/ArpltnInforInqireSvc/getMsrstnAcctoRltmMesureDnsty?serviceKey=${AIR_KOREA_API_KEY}&returnType=json&numOfRows=1&pageNo=1&stationName=${encodeURIComponent(stationName)}&dataTerm=DAILY&ver=1.3`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.response && data.response.body && data.response.body.items.length > 0) {
                    const item = data.response.body.items[0];
                    const pm10 = parseInt(item.pm10Value);
                    const pm25 = parseInt(item.pm25Value);
                    
                    if (!isNaN(pm10) || !isNaN(pm25)) {
                        updateUI(pm10, pm25, item.o3Value || '-', item.no2Value || '-', stationName);
                    } else {
                        throw new Error("점검 중");
                    }
                } else {
                    throw new Error("데이터 없음");
                }
            } catch (error) {
                document.getElementById('icon').innerText = '🛠️';
                document.getElementById('message').innerText = '측정소 점검 중';
                document.getElementById('primary-detail').innerText = `'${stationName}' 측정소 데이터가 없습니다.`;
                document.getElementById('location-info').innerText = '잠시 후 다시 시도해주세요.';
            }
        }

        // 2단계: TM 좌표로 가장 가까운 측정소 찾기 (에어코리아)
        async function getNearestStation(tmX, tmY) {
            const url = `https://apis.data.go.kr/B552584/MsrstnInfoInqireSvc/getNearbyMsrstnList?serviceKey=${AIR_KOREA_API_KEY}&returnType=json&tmX=${tmX}&tmY=${tmY}&ver=1.1`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.response && data.response.body && data.response.body.items.length > 0) {
                    // 가장 가까운 측정소 이름 추출
                    const stationName = data.response.body.items[0].stationName;
                    document.getElementById('primary-detail').innerText = `'${stationName}' 측정소 확인 완료!`;
                    // 대기질 데이터 호출
                    getAirQualityData(stationName); 
                } else {
                    throw new Error("측정소 없음");
                }
            } catch (error) {
                document.getElementById('icon').innerText = '😥';
                document.getElementById('message').innerText = '측정소 찾기 실패';
                document.getElementById('primary-detail').innerText = '근처 측정소를 찾을 수 없습니다.';
            }
        }

        // 1.5단계: 위경도를 TM 좌표로 변환 (카카오 API)
        async function convertToTM(lat, lng) {
            const url = `https://dapi.kakao.com/v2/local/geo/transcoord.json?x=${lng}&y=${lat}&input_coord=WGS84&output_coord=TM`;
            
            try {
                const response = await fetch(url, { 
                    headers: { "Authorization": `KakaoAK ${KAKAO_REST_API_KEY}` } 
                });
                const data = await response.json();
                
                if (data.documents && data.documents.length > 0) {
                    const tmX = data.documents[0].x;
                    const tmY = data.documents[0].y;
                    document.getElementById('primary-detail').innerText = '가까운 측정소 찾는 중...';
                    // 변환된 좌표로 측정소 찾기
                    getNearestStation(tmX, tmY); 
                } else {
                    throw new Error("변환 실패");
                }
            } catch (error) {
                document.getElementById('icon').innerText = '🔌';
                document.getElementById('message').innerText = '좌표 변환 실패';
                document.getElementById('primary-detail').innerText = '카카오 API 호출에 실패했습니다.';
            }
        }

        // 1단계: 내 위치(GPS) 가져오기
        function initApp() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;
                        document.getElementById('primary-detail').innerText = '좌표 변환 중...';
                        // 위경도를 TM좌표로 변환 시작
                        convertToTM(lat, lng);
                    },
                    (error) => {
                        document.getElementById('icon').innerText = '🚫';
                        document.getElementById('message').innerText = 'GPS 권한 필요';
                        document.getElementById('primary-detail').innerText = '브라우저의 위치 정보(GPS) 접근을 허용해 주세요.';
                    }
                );
            } else {
                document.getElementById('icon').innerText = '📱';
                document.getElementById('message').innerText = 'GPS 미지원';
                document.getElementById('primary-detail').innerText = 'GPS를 지원하지 않는 기기/브라우저입니다.';
            }
        }

        // 웹페이지가 열리면 바로 실행
        window.onload = initApp;
    </script>
</body>
</html>
