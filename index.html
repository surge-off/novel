<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>러닝 신호등 🏃‍♂️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            transition: background-color 0.5s ease;
            background-color: #1e293b; /* 로딩 중 기본 배경 (어두운 남색) */
            color: white;
            text-align: center;
        }
        #icon {
            font-size: 100px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }
        #message {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        #detail {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 10px;
        }
        #location-info {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-bottom: 40px;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div id="icon">⏳</div>
    <div id="message">공기질 확인 중...</div>
    <div id="detail">에어코리아 데이터를 불러오고 있습니다.</div>
    <div id="location-info"></div>

    <script>
        // 발급받은 API 키
        const API_KEY = 'd52470c737c315329b21e95427f7bcb11e1750f4f7e64cf7671e84b14ff59cc7'; 
        const SIDO_NAME = '경기'; 
        const STATION_NAME = '인계동'; 

        // 화면 업데이트 함수
        function updateUI(pm10Value) {
            const body = document.body;
            const icon = document.getElementById('icon');
            const message = document.getElementById('message');
            const detail = document.getElementById('detail');
            const locationInfo = document.getElementById('location-info');

            locationInfo.innerText = `📍 ${SIDO_NAME} ${STATION_NAME} 측정소 기준`;

            if (pm10Value <= 30) {
                body.style.backgroundColor = '#3b82f6'; // 파랑
                icon.innerText = '🤩';
                message.innerText = '지금 당장 뛰세요!';
                detail.innerText = `미세먼지 좋음 (${pm10Value}µg/m³) - 러닝 최적의 날씨`;
            } else if (pm10Value <= 80) {
                body.style.backgroundColor = '#22c55e'; // 초록
                icon.innerText = '🏃‍♂️';
                message.innerText = '가볍게 뛰기 좋아요';
                detail.innerText = `미세먼지 보통 (${pm10Value}µg/m³) - 무난한 공기`;
            } else if (pm10Value <= 150) {
                body.style.backgroundColor = '#f97316'; // 주황
                icon.innerText = '😷';
                message.innerText = '마스크 필수! 실내 훈련 권장';
                detail.innerText = `미세먼지 나쁨 (${pm10Value}µg/m³) - 호흡기 주의`;
            } else {
                body.style.backgroundColor = '#ef4444'; // 빨강
                icon.innerText = '🛑';
                message.innerText = '절대 나가지 마세요!';
                detail.innerText = `미세먼지 매우 나쁨 (${pm10Value}µg/m³) - 건강 치명적`;
            }
        }

        // 공공데이터 API 호출 함수
        async function getAirQualityData() {
            // HTTPS 환경에서도 동작하도록 https:// 로 호출
            const url = `https://apis.data.go.kr/B552584/ArpltnInforInqireSvc/getCtprvnRltmMesureDnsty?serviceKey=${API_KEY}&returnType=json&numOfRows=100&pageNo=1&sidoName=${encodeURIComponent(SIDO_NAME)}&ver=1.0`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                const stationData = data.response.body.items.find(item => item.stationName === STATION_NAME);

                if (stationData) {
                    const pm10 = parseInt(stationData.pm10Value);
                    
                    if (!isNaN(pm10)) {
                        updateUI(pm10);
                    } else {
                        document.getElementById('icon').innerText = '🛠️';
                        document.getElementById('message').innerText = '측정소 점검 중';
                        document.getElementById('detail').innerText = '현재 해당 지역의 측정소가 점검 중입니다.';
                        document.body.style.backgroundColor = '#64748b'; // 회색
                    }
                } else {
                    document.getElementById('icon').innerText = '😥';
                    document.getElementById('message').innerText = '데이터 오류';
                    document.getElementById('detail').innerText = '해당 측정소를 찾을 수 없습니다.';
                }
            } catch (error) {
                console.error("API 호출 에러:", error);
                document.getElementById('icon').innerText = '🔌';
                document.getElementById('message').innerText = '연결 실패';
                
                // 공공데이터 API 초기 동기화 지연 또는 CORS 문제 안내
                document.getElementById('detail').innerText = 'API 키가 아직 동기화되지 않았거나 네트워크 문제입니다.\n(키 발급 후 1~2시간 소요될 수 있습니다)';
                document.body.style.backgroundColor = '#333333';
            }
        }

        // 브라우저가 열리면 바로 데이터 로드 시작
        window.onload = () => {
            getAirQualityData(); 
        };
    </script>
</body>
</html>
