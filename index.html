<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미세먼지 알리미</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        h1 { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.5rem; color: #6b7280; }
        #location { font-size: 1.5rem; font-weight: bold; margin-bottom: 1.5rem; word-break: keep-all; }
        
        .dust-card {
            padding: 1.5rem;
            border-radius: 15px;
            margin-bottom: 1rem;
            color: white;
            transition: background-color 0.3s ease;
            background-color: #d1d5db; /* 기본 회색 (로딩중) */
        }
        .dust-card h2 { font-size: 1.1rem; opacity: 0.9; margin-bottom: 0.5rem; }
        .dust-card .status { font-size: 2rem; font-weight: bold; margin-bottom: 0.2rem; }
        .dust-card .value { font-size: 1rem; opacity: 0.8; }

        /* 색상 상태 */
        .bg-good { background-color: #3b82f6; }   /* 파랑: 좋음 */
        .bg-normal { background-color: #22c55e; } /* 초록: 보통 */
        .bg-bad { background-color: #f97316; }    /* 주황: 나쁨 */
        .bg-verybad { background-color: #ef4444; }/* 빨강: 매우나쁨 */

        #loading { margin-top: 1rem; font-size: 0.9rem; color: #9ca3af; }
        button.refresh {
            margin-top: 1rem;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 25px;
            background-color: #374151;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
        }
        button.refresh:active { background-color: #1f2937; }
    </style>
</head>
<body>

    <div class="container">
        <h1>📍 현재 측정소</h1>
        <div id="location">위치 찾는 중...</div>

        <div id="pm10-card" class="dust-card">
            <h2>미세먼지 (PM10)</h2>
            <div id="pm10-status" class="status">-</div>
            <div id="pm10-value" class="value">0 µg/m³</div>
        </div>

        <div id="pm25-card" class="dust-card">
            <h2>초미세먼지 (PM2.5)</h2>
            <div id="pm25-status" class="status">-</div>
            <div id="pm25-value" class="value">0 µg/m³</div>
        </div>

        <div id="loading">위치 정보를 허용해 주세요.</div>
        <button class="refresh" onclick="init()">새로고침</button>
    </div>

    <script>
        const KAKAO_KEY = "8811331ec6b369285c4409ab6f200d2f";
        const AIR_KEY = "d52470c737c315329b21e95427f7bcb11e1750f4f7e64cf7671e84b14ff59cc7";

        // 미세먼지 등급 및 색상 계산
        function getStatus(value, type) {
            if (!value || value === "-") return { text: "알수없음", class: "" };
            const v = Number(value);
            if (type === 'pm10') {
                if (v <= 30) return { text: "좋음", class: "bg-good" };
                if (v <= 80) return { text: "보통", class: "bg-normal" };
                if (v <= 150) return { text: "나쁨", class: "bg-bad" };
                return { text: "매우나쁨", class: "bg-verybad" };
            } else {
                if (v <= 15) return { text: "좋음", class: "bg-good" };
                if (v <= 35) return { text: "보통", class: "bg-normal" };
                if (v <= 75) return { text: "나쁨", class: "bg-bad" };
                return { text: "매우나쁨", class: "bg-verybad" };
            }
        }

        async function fetchAirQuality(lat, lng) {
            document.getElementById('loading').innerText = "카카오 API로 좌표 변환 중...";
            
            try {
                // 1. 카카오 API: 위경도(WGS84) -> TM좌표 변환
                const kakaoRes = await fetch(`https://dapi.kakao.com/v2/local/geo/transcoord.json?x=${lng}&y=${lat}&input_coord=WGS84&output_coord=TM`, {
                    headers: { 'Authorization': `KakaoAK ${KAKAO_KEY}` }
                });
                const kakaoData = await kakaoRes.json();
                const tmX = kakaoData.documents[0].x;
                const tmY = kakaoData.documents[0].y;

                document.getElementById('loading').innerText = "가장 가까운 측정소 찾는 중...";

                // 2. 공공데이터 API: TM좌표 -> 근접 측정소 찾기
                const stationRes = await fetch(`https://apis.data.go.kr/B552584/MsrstnInfoInqireSvc/getNearbyMsrstnList?serviceKey=${AIR_KEY}&returnType=json&tmX=${tmX}&tmY=${tmY}`);
                const stationData = await stationRes.json();
                const stationName = stationData.response.body.items[0].stationName;
                
                document.getElementById('location').innerText = `${stationName} 측정소`;
                document.getElementById('loading').innerText = "실시간 미세먼지 정보 가져오는 중...";

                // 3. 공공데이터 API: 측정소명 -> 실시간 미세먼지 수치
                const dustRes = await fetch(`https://apis.data.go.kr/B552584/ArpltnInforInqireSvc/getMsrstnAcctoRltmMesureDnsty?serviceKey=${AIR_KEY}&returnType=json&numOfRows=1&pageNo=1&stationName=${encodeURIComponent(stationName)}&dataTerm=DAILY&ver=1.0`);
                const dustData = await dustRes.json();
                const item = dustData.response.body.items[0];

                // UI 업데이트
                const pm10Status = getStatus(item.pm10Value, 'pm10');
                const pm25Status = getStatus(item.pm25Value, 'pm25');

                const pm10Card = document.getElementById('pm10-card');
                pm10Card.className = `dust-card ${pm10Status.class}`;
                document.getElementById('pm10-status').innerText = pm10Status.text;
                document.getElementById('pm10-value').innerText = `${item.pm10Value} µg/m³`;

                const pm25Card = document.getElementById('pm25-card');
                pm25Card.className = `dust-card ${pm25Status.class}`;
                document.getElementById('pm25-status').innerText = pm25Status.text;
                document.getElementById('pm25-value').innerText = `${item.pm25Value} µg/m³`;

                document.getElementById('loading').innerText = "업데이트 완료!";
                setTimeout(() => document.getElementById('loading').innerText = "", 2000);

            } catch (error) {
                console.error(error);
                document.getElementById('loading').innerText = "정보를 불러오는데 실패했습니다.";
                alert("데이터를 가져오는 중 오류가 발생했습니다. (개발자 도구 콘솔을 확인해주세요)");
            }
        }

        function init() {
            document.getElementById('loading').innerText = "위치 정보를 가져오는 중...";
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        fetchAirQuality(position.coords.latitude, position.coords.longitude);
                    },
                    (error) => {
                        document.getElementById('loading').innerText = "위치 정보 권한이 필요합니다.";
                    }
                );
            } else {
                document.getElementById('loading').innerText = "이 브라우저에서는 위치 정보를 지원하지 않습니다.";
            }
        }

        // 앱 실행 시 자동 시작
        window.onload = init;
    </script>
</body>
</html>
