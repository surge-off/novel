<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>러닝 신호등 🏃‍♂️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            transition: background-color 0.5s ease;
            background-color: #1e293b;
            color: white;
            text-align: center;
        }
        
        /* 2단계 드롭다운 컨테이너 */
        .select-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            z-index: 10;
        }
        select {
            padding: 10px 15px;
            font-size: 1.1rem;
            border-radius: 8px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            background-color: rgba(0, 0, 0, 0.3);
            color: white;
            font-family: inherit;
            font-weight: bold;
            outline: none;
            cursor: pointer;
            text-align: center;
        }
        select option {
            background-color: #1e293b;
            color: white;
        }
        select:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #icon {
            font-size: 100px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }
        #message {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        #primary-detail {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .data-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: none;
        }
        .data-row {
            font-size: 1rem;
            margin: 5px 0;
            opacity: 0.9;
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }
        #location-info {
            font-size: 0.9rem;
            opacity: 0.7;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div class="select-group">
        <select id="sido-select">
            <option value="서울">서울</option>
            <option value="부산">부산</option>
            <option value="대구">대구</option>
            <option value="인천">인천</option>
            <option value="광주">광주</option>
            <option value="대전">대전</option>
            <option value="울산">울산</option>
            <option value="경기" selected>경기</option>
            <option value="강원">강원</option>
            <option value="충북">충북</option>
            <option value="충남">충남</option>
            <option value="전북">전북</option>
            <option value="전남">전남</option>
            <option value="경북">경북</option>
            <option value="경남">경남</option>
            <option value="제주">제주</option>
            <option value="세종">세종</option>
        </select>
        <select id="station-select">
            <option value="">측정소 불러오는 중...</option>
        </select>
    </div>

    <div id="icon">⏳</div>
    <div id="message">대기질 분석 중...</div>
    <div id="primary-detail">데이터를 불러오는 중입니다</div>
    
    <div class="data-box" id="data-box">
        <div class="data-row">
            <span>미세먼지 (PM10)</span>
            <span id="val-pm10">-</span>
        </div>
        <div class="data-row">
            <span>초미세먼지 (PM2.5)</span>
            <span id="val-pm25">-</span>
        </div>
        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.2); margin: 10px 0;">
        <div class="data-row" style="font-size: 0.9rem; opacity: 0.8;">
            <span>오존 (O3)</span>
            <span id="val-o3">-</span>
        </div>
        <div class="data-row" style="font-size: 0.9rem; opacity: 0.8;">
            <span>이산화질소 (NO2)</span>
            <span id="val-no2">-</span>
        </div>
    </div>

    <div id="location-info"></div>

    <script>
        const API_KEY = 'd52470c737c315329b21e95427f7bcb11e1750f4f7e64cf7671e84b14ff59cc7'; 
        let currentSidoData = []; // 현재 선택된 시/도의 모든 측정소 데이터를 저장할 배열

        // UI 업데이트 함수
        function updateUI(pm10, pm25, o3, no2, stationName, sidoName) {
            const body = document.body;
            const icon = document.getElementById('icon');
            const message = document.getElementById('message');
            const primaryDetail = document.getElementById('primary-detail');
            
            document.getElementById('data-box').style.display = 'block';
            document.getElementById('val-pm10').innerText = isNaN(pm10) ? '-' : `${pm10} µg/m³`;
            document.getElementById('val-pm25').innerText = isNaN(pm25) ? '-' : `${pm25} µg/m³`;
            document.getElementById('val-o3').innerText = o3 === '-' ? '-' : `${o3} ppm`;
            document.getElementById('val-no2').innerText = no2 === '-' ? '-' : `${no2} ppm`;
            
            document.getElementById('location-info').innerText = `📍 ${sidoName} ${stationName} 측정소 기준`;

            let status = 0; 
            
            if (pm10 > 150 || pm25 > 75) status = 3;
            else if (pm10 > 80 || pm25 > 35) status = 2;
            else if (pm10 > 30 || pm25 > 15) status = 1;

            if (isNaN(pm10) && isNaN(pm25)) {
                // 데이터가 둘 다 없는 경우
                body.style.backgroundColor = '#64748b'; 
                icon.innerText = '🛠️';
                message.innerText = '측정소 점검 중';
                primaryDetail.innerText = '현재 수치 업데이트가 지연되고 있습니다.';
            } else if (status === 0) {
                body.style.backgroundColor = '#3b82f6'; 
                icon.innerText = '🤩';
                message.innerText = '최상의 컨디션!';
                primaryDetail.innerText = '당장 러닝화를 신으세요';
            } else if (status === 1) {
                body.style.backgroundColor = '#22c55e'; 
                icon.innerText = '🏃‍♂️';
                message.innerText = '가볍게 뛰기 좋아요';
                primaryDetail.innerText = '야외 훈련하기 무난한 공기입니다';
            } else if (status === 2) {
                body.style.backgroundColor = '#f97316'; 
                icon.innerText = '😷';
                message.innerText = '마스크 챙기셨나요?';
                primaryDetail.innerText = '호흡기가 예민하다면 실내 훈련 권장';
            } else {
                body.style.backgroundColor = '#ef4444'; 
                icon.innerText = '🛑';
                message.innerText = '절대 나가지 마세요!';
                primaryDetail.innerText = '오늘은 폼롤러와 실내 코어 운동의 날';
            }
        }

      // 시/도 단위로 모든 측정소 데이터를 가져오는 함수
        async function fetchStationsBySido(sido) {
            document.getElementById('icon').innerText = '⏳';
            document.getElementById('message').innerText = `${sido} 대기질 분석 중...`;
            document.getElementById('primary-detail').innerText = '데이터를 불러오는 중입니다';
            document.getElementById('data-box').style.display = 'none';
            document.getElementById('location-info').innerText = '';
            
            const stationSelect = document.getElementById('station-select');
            stationSelect.innerHTML = '<option value="">불러오는 중...</option>';
            stationSelect.disabled = true;

            const url = `https://apis.data.go.kr/B552584/ArpltnInforInqireSvc/getCTprvnRltmMesureDnsty?serviceKey=${API_KEY}&returnType=json&numOfRows=200&pageNo=1&sidoName=${encodeURIComponent(sido)}&ver=1.3`;

            try {
                const response = await fetch(url);
                const textData = await response.text(); // 일단 날것의 텍스트로 받아옴

                // 서버에서 XML 에러 메시지를 보냈는지 확인
                if (textData.startsWith('<')) {
                    console.error("❌ API 서버가 에러를 반환했습니다 (XML):", textData);
                    throw new Error("API 키 오류 또는 공공데이터 서버 에러입니다. (F12 콘솔 확인)");
                }

                const data = JSON.parse(textData); // JSON으로 변환 시도

                if (data.response && data.response.body && data.response.body.items && data.response.body.items.length > 0) {
                    currentSidoData = data.response.body.items;
                    
                    currentSidoData.sort((a, b) => a.stationName.localeCompare(b.stationName));
                    
                    stationSelect.innerHTML = '';
                    currentSidoData.forEach(station => {
                        const option = document.createElement('option');
                        option.value = station.stationName;
                        option.innerText = station.stationName;
                        stationSelect.appendChild(option);
                    });
                    
                    stationSelect.disabled = false;

                    let defaultStation = currentSidoData.find(s => s.stationName === '인계동');
                    if (!defaultStation || sido !== '경기') {
                        defaultStation = currentSidoData[0];
                    }
                    
                    stationSelect.value = defaultStation.stationName;
                    displaySelectedStationData();

                } else {
                    throw new Error("데이터 배열이 비어있습니다.");
                }
            } catch (error) {
                console.error("❌ API 호출 에러 상세:", error);
                document.getElementById('icon').innerText = '🔌';
                document.getElementById('message').innerText = '연결 실패';
                document.getElementById('primary-detail').innerText = error.message.includes('API 키') ? 'API 키 문제이거나 서버 점검 중입니다.' : '네트워크 문제이거나 CORS 차단입니다.';
            }
        }
        // 선택된 측정소의 데이터를 찾아서 화면에 그려주는 함수 (API 재호출 안 함)
        function displaySelectedStationData() {
            const selectedStationName = document.getElementById('station-select').value;
            const selectedSidoName = document.getElementById('sido-select').value;
            
            // 미리 저장해둔 currentSidoData 배열에서 측정소 정보 찾기
            const stationData = currentSidoData.find(s => s.stationName === selectedStationName);
            
            if (stationData) {
                const pm10 = parseInt(stationData.pm10Value);
                const pm25 = parseInt(stationData.pm25Value);
                const o3 = stationData.o3Value || '-';
                const no2 = stationData.no2Value || '-';
                
                updateUI(pm10, pm25, o3, no2, selectedStationName, selectedSidoName);
            }
        }

        // 이벤트 리스너: 시/도 변경 시 API 새로 호출
        document.getElementById('sido-select').addEventListener('change', (e) => {
            fetchStationsBySido(e.target.value);
        });

        // 이벤트 리스너: 측정소 변경 시 화면만 즉시 업데이트 (API 호출 X)
        document.getElementById('station-select').addEventListener('change', () => {
            displaySelectedStationData();
        });

        // 초기 로딩 시 실행 (기본값: 경기)
        window.onload = () => {
            const initialSido = document.getElementById('sido-select').value;
            fetchStationsBySido(initialSido); 
        };
    </script>
</body>
</html>
